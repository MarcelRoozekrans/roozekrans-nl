<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Radial glow -->
  <radialGradient id="glow" cx="20%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Cyan accent bar -->
  <rect x="80" y="195" width="4" height="72" rx="2" fill="#22d3ee"/>

  <!-- Name -->
  <text x="108" y="252" font-family="system-ui,-apple-system,sans-serif" font-size="60" font-weight="700" fill="#ffffff" letter-spacing="-1">Marcel Roozekrans</text>

  <!-- Tagline -->
  <text x="109" y="306" font-family="ui-monospace,monospace" font-size="26" fill="#22d3ee">Software Engineer · Open Source · .NET</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="400" y2="440" stroke="#27272a" stroke-width="1"/>

  <!-- Domain -->
  <text x="80" y="480" font-family="ui-monospace,monospace" font-size="20" fill="#52525b">roozekrans.nl</text>
</svg>
